<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>阿嬤的五十音學習</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/yakuhanjp@3.4.1/dist/css/yakuhanjp.min.css');
@font-face {
  font-family: 'ZenMaruGothic';
  src: url('https://cdn.jsdelivr.net/gh/googlefonts/zen-fonts@main/ZenMaruGothic/fonts/ttf/ZenMaruGothic-Bold.ttf') format('truetype');
  font-weight: 700;
  font-display: swap;
}

:root {
–bg: #FDF5F2;
–card: #FFFFFF;

/* 平假名：粉紅咖啡色系 */
–h-main: #B5735A;
–h-light: #F2DDD6;
–h-shadow: rgba(181,115,90,0.25);

/* 片假名：藍天淡黃色系 */
–k-main: #5A8EB5;
–k-light: #D6E8F2;
–k-shadow: rgba(90,142,181,0.25);

–accent-yellow: #EDE8B0;
–accent-yellow-text: #6A6418;
–accent-yellow-shadow: rgba(150,140,50,0.22);

–text: #3A2820;
–text-muted: #A88878;
–border: #EDD6CC;
–success: #7AAF65;
–error: #B5735A;

–main: var(–h-main);
–main-light: var(–h-light);
–main-shadow: var(–h-shadow);
}
body.kata {
–bg: #F2F7FD;
–main: var(–k-main);
–main-light: var(–k-light);
–main-shadow: var(–k-shadow);
–border: #C8DFF0;
–text-muted: #7898B0;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

body {
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
background: #FDF5F2;
color: #3A2820;
min-height: 100vh;
transition: background 0.4s;
}

/* ===== HEADER ===== */
.header {
background: #B5735A;
padding: 12px 14px 10px;
display: flex; align-items: center; justify-content: space-between;
position: sticky; top: 0; z-index: 100;
box-shadow: 0 4px 0 rgba(0,0,0,0.08);
}
.header-left { display: flex; align-items: center; gap: 8px; }
.header-icon { font-size: 28px; line-height: 1; }
.header-title {
font-size: 20px; font-weight: 900; color: white;
letter-spacing: 1px; text-shadow: 1px 2px 0 rgba(0,0,0,0.12);
white-space: nowrap;
}
.header-greeting {
font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.82);
margin-top: 2px; white-space: nowrap; overflow: hidden;
text-overflow: ellipsis; max-width: 180px;
}
.bottom-bar {
background: white; border-top: 2px solid #EDD6CC;
padding: 20px;
display: flex; justify-content: center;
}
.yt-btn {
display: flex; align-items: center; justify-content: center; gap: 8px;
background: #B5735A; color: white;
border-radius: 50px; padding: 14px 32px;
font-size: 19px; font-weight: 900;
text-decoration: none;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
box-shadow: 0 4px 16px var(–main-shadow);
transition: all 0.15s; width: 100%; max-width: 420px;
}
.yt-btn:active { transform: scale(0.97); }
.kana-switch { display: flex; gap: 6px; }
.kana-btn {
padding: 8px 12px; border-radius: 50px;
border: 2px solid rgba(255,255,255,0.7);
font-size: 15px; font-weight: 900; cursor: pointer;
background: rgba(255,255,255,0.15); color: white;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
transition: all 0.2s;
}
.kana-btn.active {
background: white; color: #B5735A;
border-color: white;
box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}
.kana-btn.active {
background: white; color: #B5735A;
border-color: white;
box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

/* ===== MODE TABS ===== */
.mode-tabs {
display: flex;
background: white;
border-bottom: 3px solid #EDD6CC;
position: sticky; top: 64px; z-index: 90;

}
.mode-tab {
flex: 1; padding: 18px 4px; text-align: center;
font-size: 19px; font-weight: 700; cursor: pointer;
border: none; background: transparent; color: #A88878;
border-bottom: 4px solid transparent; margin-bottom: -3px;
transition: all 0.2s;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
}
.mode-tab.active { color: #B5735A; border-bottom-color: #B5735A; }

/* ===== SCREENS ===== */
.screen { display: none; padding: 20px 14px 100px; position: relative; z-index: 1; }
.screen.active { display: block; }

/* ===== BROWSE ===== */
.browse-topbar {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.browse-topbar h2 { font-size: 24px; font-weight: 900; }

.pill-toggle {
display: flex; align-items: center; gap: 8px;
font-size: 19px; font-weight: 700; cursor: pointer;
background: white; border: 2.5px solid #EDD6CC;
border-radius: 50px; padding: 12px 20px;
transition: border-color 0.3s;
}
.pill-toggle input[type=“checkbox”] {
width: 24px; height: 24px; cursor: pointer;
accent-color: #B5735A;
}

.row-label {
font-size: 16px; font-weight: 900; color: #A88878;
letter-spacing: 2px; margin: 16px 0 8px 2px;
text-transform: uppercase;
}
.row-label-phonetic {
font-size: 18px; font-weight: 900; color: #B5735A;
letter-spacing: 0; font-style: normal;
}
.browse-tip {
font-size: 17px; color: #A88878; font-weight: 700;
margin-bottom: 14px; padding-left: 2px;
}
.kana-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }

.kana-card {
background: white;
border: 3px solid #EDD6CC;
border-radius: 20px;
padding: 12px 6px 10px;
min-width: 82px; flex: 1; max-width: 108px;
text-align: center; cursor: pointer;
transition: all 0.15s;
box-shadow: 0 4px 0 #EDD6CC;
user-select: none; position: relative;
overflow: hidden;
}
.kana-card.compact {
padding: 22px 6px 20px;
}
.kana-card::after {
content: ‘’;
position: absolute; inset: 0;
background: #F2DDD6;
opacity: 0; transition: opacity 0.15s;
border-radius: 17px;
}
.kana-card:active, .kana-card.playing {
transform: translateY(3px);
box-shadow: 0 1px 0 #EDD6CC;
}
.kana-card.playing::after { opacity: 1; }

.kana-char {
font-family: ‘ZenMaruGothic’, ‘Hiragino Rounded Gothic ProN’, ‘Hiragino MaruGothic ProN’, ‘Yu Gothic’, sans-serif; font-weight: 700;
font-size: 54px; line-height: 1.1; display: block;
position: relative; z-index: 1;
transition: font-size 0.2s;
}
.kana-card.compact .kana-char { font-size: 72px; }

.kana-phonetic {
font-size: 19px; font-weight: 900; color: #B5735A;
margin-top: 4px; position: relative; z-index: 1;
transition: color 0.3s, opacity 0.2s, max-height 0.2s;
max-height: 40px; overflow: hidden;
}
.kana-phonetic.hidden { opacity: 0; max-height: 0; margin-top: 0; }

.kana-hint {
font-size: 13px; color: #C09080; margin-top: 5px;
line-height: 1.35; position: relative; z-index: 1;
transition: opacity 0.2s, max-height 0.2s;
max-height: 60px; overflow: hidden;
}
.kana-hint.hidden { opacity: 0; max-height: 0; margin-top: 0; }

/* ===== PRACTICE ===== */
.prac-wrap { max-width: 460px; margin: 0 auto; text-align: center; }
.prac-progress {
font-size: 20px; font-weight: 700; color: #A88878;
margin-bottom: 16px;
}
/* Progress dots */
.prac-dots { display: flex; justify-content: center; gap: 5px; margin-bottom: 18px; flex-wrap: wrap; }
.prac-dot {
width: 10px; height: 10px; border-radius: 50%;
background: var(–border); transition: background 0.3s, transform 0.2s;
}
.prac-dot.done { background: #B5735A; }
.prac-dot.current { background: var(–accent1); transform: scale(1.3); }

.prac-card {
background: white; border-radius: 32px;
padding: 40px 28px 32px;
box-shadow: 0 8px 0 #EDD6CC, 0 12px 30px rgba(0,0,0,0.06);
border: 3px solid #EDD6CC;
margin-bottom: 20px; position: relative; overflow: hidden;
}
.prac-card::before {
content: ‘’;
position: absolute; top: -30px; right: -30px;
width: 120px; height: 120px; border-radius: 50%;
background: #F2DDD6; opacity: 0.6;
}
.prac-kana {
font-family: ‘ZenMaruGothic’, ‘Hiragino Rounded Gothic ProN’, ‘Hiragino MaruGothic ProN’, ‘Yu Gothic’, sans-serif; font-weight: 700;
font-size: 160px; line-height: 1; display: block;
margin-bottom: 14px; position: relative; z-index: 1;
filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.08));
}
.prac-phonetic {
font-size: 46px; font-weight: 900; color: #B5735A;
margin-bottom: 16px; position: relative; z-index: 1;
transition: opacity 0.3s, color 0.3s;
}
.prac-phonetic.hidden { opacity: 0; }

.prac-hint-box {
background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
border: 2.5px solid #FFD54F;
border-radius: 16px; padding: 18px 22px;
font-size: 20px; color: #6D4C41; line-height: 1.6;
position: relative; z-index: 1;
transition: opacity 0.3s;
}
.prac-hint-box.hidden { opacity: 0; }
.prac-hint-emoji { font-size: 22px; margin-right: 6px; }

.phonetic-toggle-row {
display: flex; align-items: center; justify-content: center; gap: 8px;
font-size: 19px; font-weight: 700; cursor: pointer; margin-bottom: 14px;
}
.phonetic-toggle-row input[type=“checkbox”] {
width: 24px; height: 24px; cursor: pointer; accent-color: #B5735A;
}

.play-big-btn {
display: flex; align-items: center; justify-content: center; gap: 12px;
background: #B5735A; color: white; border: none;
border-radius: 50px; font-size: 28px; font-weight: 900;
padding: 26px 40px; cursor: pointer; width: 100%;
margin-bottom: 16px;
box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 8px 20px var(–main-shadow);
transition: all 0.15s;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
}
.play-big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

.prac-nav { display: flex; gap: 12px; }
.nav-btn {
flex: 1; padding: 22px; border-radius: 18px;
font-size: 22px; font-weight: 900; cursor: pointer; border: none;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif; transition: all 0.15s;
}
.nav-btn.prev {
background: white; border: 3px solid #EDD6CC; color: #3A2820;
box-shadow: 0 4px 0 #EDD6CC;
}
.nav-btn.prev:active { transform: translateY(3px); box-shadow: 0 1px 0 #EDD6CC; }
.nav-btn.next {
background: #EDE8B0; color: #6A6418;
box-shadow: 0 4px 0 rgba(150,140,50,0.22);
border: none;
}
.nav-btn.next:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(150,140,50,0.22); }

/* ===== QUIZ ===== */
.quiz-wrap { max-width: 460px; margin: 0 auto; text-align: center; }

.quiz-scorebar {
display: flex; justify-content: space-between; align-items: center;
background: white; border-radius: 20px; padding: 14px 20px;
margin-bottom: 18px; font-size: 17px; font-weight: 900;
box-shadow: 0 4px 0 #EDD6CC; border: 3px solid #EDD6CC;
}
.score-correct { color: #7AAF65; }
.score-wrong { color: #B5735A; }
.score-prog { color: #A88878; font-size: 14px; }

.quiz-prompt-box {
position: relative;
background: white; border-radius: 26px; padding: 28px 22px 22px;
margin-bottom: 16px;
box-shadow: 0 6px 0 #EDD6CC; border: 3px solid #EDD6CC;
text-align: center;
}
.quiz-prompt-label { font-size: 22px; color: #3A2820; font-weight: 900; margin-bottom: 12px; padding-right: 0; display: block; }
.quiz-speak-btn {
display: inline-flex; align-items: center; gap: 6px;
background: #F2DDD6; color: #B5735A;
border: 2px solid #EDD6CC;
border-radius: 50px; padding: 8px 20px;
font-size: 17px; font-weight: 700; cursor: pointer;
transition: all 0.15s; font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
width: auto; box-shadow: none;
position: static;
}
.quiz-speak-btn:active { transform: scale(0.94); }

.quiz-hint-box {
background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
border: 2.5px solid #FFD54F; border-radius: 14px;
padding: 16px 20px; font-size: 19px; color: #6D4C41;
margin-top: 14px; text-align: left; line-height: 1.5;
transition: opacity 0.3s;
}
.quiz-hint-box.hidden { opacity: 0; pointer-events: none; }

.quiz-hint-toggle-row {
display: flex; align-items: center; justify-content: center; gap: 8px;
font-size: 19px; font-weight: 700; cursor: pointer; margin-bottom: 14px;
}
.quiz-hint-toggle-row input[type=“checkbox”] {
width: 24px; height: 24px; cursor: pointer; accent-color: #B5735A;
}

.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.quiz-opt {
background: white; border: 3px solid #EDD6CC;
border-radius: 22px; padding: 18px 8px;
font-family: ‘ZenMaruGothic’, ‘Hiragino Rounded Gothic ProN’, ‘Hiragino MaruGothic ProN’, ‘Yu Gothic’, sans-serif; font-weight: 700; font-size: 70px;
cursor: pointer; transition: all 0.15s;
box-shadow: 0 5px 0 #EDD6CC; line-height: 1;
position: relative; overflow: hidden;
}
.quiz-opt:active { transform: translateY(4px); box-shadow: 0 1px 0 #EDD6CC; }
.quiz-opt.correct {
border-color: #7AAF65; background: #F0FBF2;
box-shadow: 0 5px 0 rgba(122,175,101,0.4);
}
.quiz-opt.wrong {
border-color: #B5735A; background: #FFF0F0;
box-shadow: 0 5px 0 rgba(181,115,90,0.3);
opacity: 0.5;
}
.quiz-opt.reveal {
border-color: #7AAF65; background: #E8F8EC;
box-shadow: 0 0 0 4px rgba(122,175,101,0.3), 0 5px 0 rgba(122,175,101,0.4);
animation: revealBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.quiz-opt.disabled { pointer-events: none; }

@keyframes revealBounce {
0%   { transform: translateY(0) scale(1); }
30%  { transform: translateY(-16px) scale(1.08); }
60%  { transform: translateY(-6px) scale(1.04); }
100% { transform: translateY(0) scale(1.03); }
}

.quiz-feedback {
font-size: 26px; font-weight: 900; padding: 16px; border-radius: 16px;
margin-bottom: 14px; display: none;
}
.quiz-feedback.show-correct {
display: block; background: #F0FBF2; color: #7AAF65;
border: 2px solid rgba(107,203,119,0.4);
}
.quiz-feedback.show-wrong {
display: block; background: #FFF0F0; color: #B5735A;
border: 2px solid rgba(255,107,107,0.3);
}

.quiz-next-btn {
background: #EDE8B0; color: #6A6418; border: none;
border-radius: 18px; padding: 24px; font-size: 24px; font-weight: 900;
width: 100%; cursor: pointer; display: none;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
box-shadow: 0 5px 0 rgba(150,140,50,0.22);
transition: all 0.15s;
}
.quiz-next-btn.show { display: block; }
.quiz-next-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(150,140,50,0.22); }

/* FINISH */
.quiz-finish {
display: none; background: white; border-radius: 32px;
padding: 50px 28px;
box-shadow: 0 8px 0 var(–border), 0 12px 40px rgba(0,0,0,0.08);
border: 3px solid #EDD6CC; text-align: center;
}
.quiz-finish.show { display: block; }
.finish-emoji { font-size: 80px; margin-bottom: 14px; }
.finish-title { font-size: 38px; font-weight: 900; margin-bottom: 16px; }
.finish-score {
display: flex; justify-content: center; gap: 16px;
margin-bottom: 14px;
}
.finish-score-item {
padding: 10px 22px; border-radius: 50px;
font-size: 20px; font-weight: 900;
}
.finish-score-correct { background: #EAFAF1; color: #7AAF65; }
.finish-score-wrong { background: #FFF0EE; color: #B5735A; }
.finish-encourage {
font-size: 20px; color: #A88878; margin-bottom: 28px; line-height: 1.6;
}
.finish-wrong-list {
display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
margin-bottom: 28px;
}
.finish-wrong-char {
font-family: ‘ZenMaruGothic’, ‘Hiragino Rounded Gothic ProN’, ‘Hiragino MaruGothic ProN’, ‘Yu Gothic’, sans-serif; font-weight: 700;
font-size: 42px; line-height: 1;
background: #FFF0EE; border: 2.5px solid #FFBCB0;
border-radius: 14px; padding: 10px 14px;
color: #3A2820;
}
body.kata .finish-wrong-char { background: #EEF4FF; border-color: #B0C8FF; }
.retry-btn {
background: var(–error); color: white; border: none;
border-radius: 18px; padding: 22px 40px; font-size: 22px; font-weight: 900;
cursor: pointer; width: 100%; margin-bottom: 14px;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
box-shadow: 0 5px 0 rgba(0,0,0,0.10);
transition: all 0.15s;
}
body.kata .retry-btn { background: var(–k-main); }
.retry-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.10); }
.restart-btn {
background: #B5735A; color: white; border: none;
border-radius: 18px; padding: 26px 40px; font-size: 24px; font-weight: 900;
cursor: pointer; width: 100%;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
box-shadow: 0 5px 0 rgba(0,0,0,0.10), 0 8px 20px var(–main-shadow);
transition: all 0.15s;
}
.restart-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.10); }

/* 錯題標記 */
.kana-star {
font-size: 16px; line-height: 1;
position: absolute; top: 5px; right: 6px;
z-index: 2;
}
.kana-star:empty { display: none; }

/* ===== ANIMATIONS ===== */
@keyframes bounce {
0%,100% { transform: translateY(0); }
40% { transform: translateY(-10px); }
60% { transform: translateY(-5px); }
}
.bounce { animation: bounce 0.5s ease; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease forwards; }

/* ===== CARD MODAL ===== */
.card-modal-overlay {
display: none; position: fixed; inset: 0; z-index: 200;
background: rgba(58,45,40,0.45);
backdrop-filter: blur(6px);
align-items: center; justify-content: center;
}
.card-modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
.card-modal-inner {
background: white;
border-radius: 36px;
padding: 48px 40px 40px;
text-align: center;
box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 8px 0 var(–border);
border: 3px solid #EDD6CC;
min-width: 280px; max-width: 380px; width: 88%;
position: relative;
animation: cardPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardPop {
from { transform: scale(0.7); opacity: 0; }
to   { transform: scale(1);   opacity: 1; }
}
.card-modal-char {
font-family: ‘ZenMaruGothic’, ‘Hiragino Rounded Gothic ProN’, ‘Hiragino MaruGothic ProN’, ‘Yu Gothic’, sans-serif; font-weight: 700;
font-size: 190px; line-height: 1;
margin-bottom: 16px;
filter: drop-shadow(3px 5px 0 rgba(0,0,0,0.08));
}
.card-modal-phonetic {
font-size: 54px; font-weight: 900; color: #B5735A;
margin-bottom: 18px; transition: color 0.3s;
}
.card-modal-hint {
font-size: 22px; color: #7A5C48; line-height: 1.6;
background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
border: 2px solid #FFD54F; border-radius: 16px;
padding: 14px 18px; margin-bottom: 24px;
}
.card-modal-play {
background: #B5735A; color: white; border: none;
border-radius: 50px; padding: 22px 40px;
font-size: 26px; font-weight: 900; cursor: pointer;
width: 100%;
box-shadow: 0 5px 0 rgba(0,0,0,0.10), 0 8px 20px var(–main-shadow);
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
transition: all 0.15s;
}
.card-modal-play:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.10); }

/* ===== ROW SELECTOR ===== */
.row-selector { max-width: 520px; margin: 0 auto; }
.row-sel-label {
font-size: 24px; font-weight: 900; color: #3A2820;
text-align: center; margin-bottom: 20px;
}

/* 全部測驗 — 寬版橫條 */
.row-sel-all-btn {
display: flex; align-items: center; justify-content: center; gap: 16px;
background: #B5735A; color: white;
border: none; border-radius: 24px; padding: 26px 32px;
width: 100%; cursor: pointer;
box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 10px 24px var(–main-shadow);
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
transition: all 0.15s; margin-bottom: 20px;
}
.row-sel-all-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,0.10); }
.row-sel-all-icon { font-size: 36px; line-height: 1; }
.row-sel-all-text { text-align: left; }
.row-sel-all-title { font-size: 24px; font-weight: 900; display: block; }
.row-sel-all-sub { font-size: 17px; opacity: 0.85; display: block; margin-top: 3px; }

/* 行卡片格線 */
.row-sel-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 14px;
}

/* 單行卡片 */
.row-sel-card {
background: white; border: 3px solid #EDD6CC;
border-radius: 24px; padding: 20px 16px 18px;
cursor: pointer; transition: all 0.15s;
box-shadow: 0 5px 0 #EDD6CC;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif;
text-align: center; width: 100%; border: 3px solid #EDD6CC;
}
.row-sel-card:active { transform: translateY(4px); box-shadow: 0 1px 0 #EDD6CC; }

.row-sel-card-kanas {
font-family: ‘ZenMaruGothic’, ‘Hiragino Rounded Gothic ProN’, ‘Hiragino MaruGothic ProN’, ‘Yu Gothic’, sans-serif; font-weight: 700;
font-size: 28px; line-height: 1.3;
display: block; margin-bottom: 10px;
color: #3A2820; letter-spacing: 2px;
}
.row-sel-card-bottom {
display: flex; align-items: center; justify-content: center; gap: 8px;
}
.row-sel-card-name {
font-size: 18px; font-weight: 900; color: #3A2820;
}
.row-sel-card-phonetic {
font-size: 17px; font-weight: 900; color: #B5735A;
background: #F2DDD6; border-radius: 8px;
padding: 3px 10px;
}
.row-sel-card-count {
font-size: 14px; font-weight: 700; color: #A88878;
margin-top: 6px; display: block;
}

/* back row */
.prac-back-row {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 12px;
}
.back-btn {
background: white; border: 2.5px solid #EDD6CC;
border-radius: 50px; padding: 12px 20px;
font-size: 18px; font-weight: 700; cursor: pointer;
font-family: ‘Noto Sans TC’, ‘Hiragino Sans’, ‘Microsoft JhengHei’, sans-serif; color: #A88878;
transition: all 0.15s;
}
.back-btn:active { transform: scale(0.96); }

/* quiz scorebar inline */
.quiz-scorebar-inline {
font-size: 20px; font-weight: 900;
display: flex; align-items: center; gap: 4px;
}
.quiz-scorebar-inline .score-prog { font-size: 14px; color: #A88878; }

/* ===== 金幣 ===== */
.coin-badge {
display: flex; align-items: center; gap: 4px;
background: white;
border: 2px solid #EDD6CC;
border-radius: 50px; padding: 5px 10px;
font-size: 15px; font-weight: 900; color: #3A2820;
min-width: 56px; justify-content: center;
}
@keyframes coinPop {
0%   { transform: scale(1); }
40%  { transform: scale(1.35); }
100% { transform: scale(1); }
}
.coin-pop { animation: coinPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }

/* 手機直向（< 480px） */
@media (max-width: 480px) {
.header { padding: 10px 12px 8px; }
.header-title { font-size: 18px; letter-spacing: 0.5px; }
.header-icon { font-size: 22px; }
.header-greeting { font-size: 11px; max-width: 200px; }
.kana-btn { padding: 6px 10px; font-size: 13px; }
.coin-badge { font-size: 13px; padding: 4px 8px; min-width: 46px; }
.mode-tab { font-size: 14px; padding: 12px 4px; }
.screen { padding: 12px 10px 80px; }
.browse-topbar h2 { font-size: 18px; }
.browse-tip { font-size: 13px; }
.kana-card { min-width: 56px; max-width: 72px; padding: 10px 4px 8px; }
.kana-char { font-size: 36px; }
.kana-card.compact .kana-char { font-size: 50px; }
.kana-phonetic { font-size: 13px; }
.kana-hint { font-size: 10px; }
.prac-kana { font-size: 100px; }
.prac-phonetic { font-size: 30px; }
.prac-hint-box { font-size: 15px; padding: 12px 14px; }
.play-big-btn { font-size: 20px; padding: 18px 24px; }
.nav-btn { font-size: 17px; padding: 16px; }
.quiz-opt { font-size: 46px; padding: 12px 6px; }
.quiz-speak-btn { font-size: 20px; padding: 16px 24px; }
.quiz-next-btn { font-size: 18px; padding: 18px; }
.row-sel-card-kanas { font-size: 22px; }
.row-sel-card-name { font-size: 15px; }
.row-sel-card-phonetic { font-size: 14px; }
.row-sel-all-title { font-size: 20px; }
.row-sel-all-sub { font-size: 14px; }
.card-modal-char { font-size: 110px; }
.card-modal-phonetic { font-size: 36px; }
.card-modal-hint { font-size: 16px; }
.card-modal-play { font-size: 18px; padding: 14px 24px; }
.card-modal-inner { padding: 30px 20px 26px; }
}

/* 平板直向（481px ~ 768px） — 阿嬤的主要裝置，維持放大後的原始設計 */
@media (min-width: 481px) and (max-width: 768px) {
.screen { padding: 20px 16px 90px; }
.kana-card { min-width: 80px; max-width: 105px; }
.prac-wrap { max-width: 520px; }
.quiz-wrap { max-width: 520px; }
}

/* 平板橫向 / 小筆電（769px ~ 1024px） */
@media (min-width: 769px) and (max-width: 1024px) {
.screen { padding: 28px 36px 100px; }
.header { padding: 18px 36px; }
.kana-card { min-width: 90px; max-width: 115px; }
.kana-char { font-size: 58px; }
.prac-wrap { max-width: 560px; }
.quiz-wrap { max-width: 560px; }
.row-selector { max-width: 560px; }
}

/* 桌機（> 1024px） */
@media (min-width: 1025px) {
.screen { padding: 36px 0 120px; max-width: 760px; margin: 0 auto; }
.header { padding: 20px 56px; }
.header-title { font-size: 28px; }
.kana-card { min-width: 95px; max-width: 120px; }
.kana-char { font-size: 60px; }
.kana-phonetic { font-size: 20px; }
.kana-hint { font-size: 13px; }
.prac-wrap { max-width: 600px; }
.prac-kana { font-size: 170px; }
.play-big-btn { font-size: 30px; padding: 28px 52px; }
.quiz-wrap { max-width: 600px; }
.row-selector { max-width: 600px; }
.quiz-opt { font-size: 76px; }
.mode-tabs { justify-content: center; }
.mode-tab { flex: 0; padding: 18px 56px; font-size: 20px; }
}

  { pct: 70,  emoji: '🎉', title: '做得很好！',          sub: '答對很多個，有在進步！' },
  { pct: 50,  emoji: '😊', title: '不錯喔，繼續加油！',  sub: '一半以上答對，再練幾次就記住了！' },
  { pct: 0,   emoji: '💪', title: '慢慢來，不急！',      sub: '第一次不熟很正常，練個幾次就會了！' },
];
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function getFinishData(pct) {
  return FINISH_DATA.find(d => pct >= d.pct);
}

const ALL = ROWS.flatMap(r => r.items);
let currentKana = 'hira';

// Practice state
let pracItems = [];
let pracIdx = 0;

// Quiz state
let quizItems = [];
let quizOrder = [];
let quizIdx = 0;
let quizCorrect = 0;
let quizWrong = 0;
let quizAnswered = false;
let completedOnce = false;
let wrongItems = []; // 本輪答錯的 items

// ===== 插圖對照（每個假名對應一個可愛 emoji 插圖）=====

// ===== 金幣系統 =====
function getCoins() {
  try { return parseInt(localStorage.getItem('kana_coins') || '0'); } catch { return 0; }
}
function saveCoins(n) {
  try { localStorage.setItem('kana_coins', String(n)); } catch {}
}
function updateCoinDisplay() {
  document.getElementById('coin-count').textContent = getCoins();
}
function earnCoin() {
  const prev = getCoins();
  const next = prev + 1;
  saveCoins(next);
  updateCoinDisplay();
  const badge = document.getElementById('coin-badge');
  badge.classList.remove('coin-pop');
  void badge.offsetWidth;
  badge.classList.add('coin-pop');
}

// ===== 錯題標記 =====
function getWrongSet() {
  try { return new Set(JSON.parse(sessionStorage.getItem('kana_wrong') || '[]')); }
  catch { return new Set(); }
}
function markWrong(hira) {
  const s = getWrongSet(); s.add(hira);
  try { sessionStorage.setItem('kana_wrong', JSON.stringify([...s])); } catch {}
}
function getStars(hira) {
  return getWrongSet().has(hira) ? '⭐' : '';
}

// ===== KANA SWITCH =====
function switchKana(k) {
  currentKana = k;
  document.body.classList.toggle('kata', k === 'kata');
  document.getElementById('btn-hira').classList.toggle('active', k === 'hira');
  document.getElementById('btn-kata').classList.toggle('active', k === 'kata');
  document.getElementById('browse-title').textContent = k === 'hira' ? '平假名一覽' : '片假名一覽';
  renderBrowse();
  showRowSelector('quiz');
  renderRowSelectors();
}

// ===== MODE SWITCH =====
function switchMode(m) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + m).classList.add('active');
  const idx = ['browse','quiz'].indexOf(m);
  document.querySelectorAll('.mode-tab')[idx].classList.add('active');
}

// ===== TTS =====
// 這些字 TTS 念太短，加拖音讓它撐更久
const STRETCH = {
  'を':'おーー', 'ん':'んーー',
};
const LONG_GAP = new Set(['を','ん']);
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const tts = STRETCH[text] || text;
  const gap = LONG_GAP.has(text) ? 1600 : 800;
  const u1 = new SpeechSynthesisUtterance(tts);
  u1.lang = 'ja-JP'; u1.rate = 0.3; u1.pitch = 1.05;
  window.speechSynthesis.speak(u1);
  u1.onend = () => {
    setTimeout(() => {
      const u2 = new SpeechSynthesisUtterance(tts);
      u2.lang = 'ja-JP'; u2.rate = 0.3; u2.pitch = 1.05;
      window.speechSynthesis.speak(u2);
    }, gap);
  };
}

// ===== BROWSE =====
function renderBrowse() {
  const showHint = document.getElementById('hint-check').checked;
  const key = currentKana === 'hira' ? 'hira' : 'kata';
  const hintKey = currentKana === 'hira' ? 'hint' : 'hintKata';
  document.getElementById('browse-grid').innerHTML = ROWS.map(row => {
    const labelHtml = row.rowPhonetic
      ? `${row.label} <span class="row-label-phonetic">（${row.rowPhonetic}）</span>`
      : row.label;
    return `
    <div>
      <div class="row-label">${labelHtml}</div>
      <div class="kana-row">
        ${row.items.map(item => `
          <div class="kana-card tap-card${showHint ? '' : ' compact'}"
            data-char="${item[key]}"
            data-hira="${item.hira}"
            data-phonetic="${item.phonetic}"
            data-hint="${item[hintKey].replace(/"/g,'&quot;')}">
            <span class="kana-star">${getStars(item.hira)}</span>
            <span class="kana-char">${item[key]}</span>
            <div class="kana-phonetic${showHint ? '' : ' hidden'}">${item.phonetic}</div>
            <div class="kana-hint${showHint ? '' : ' hidden'}">${item[hintKey]}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');

  // attach tap listeners after render
  attachCardTaps();
}

let lastTap = 0;
let lastTapEl = null;
let pressTimer = null;

function attachCardTaps() {
  document.querySelectorAll('.tap-card').forEach(el => {
    // 長按（500ms）→ 放大
    el.addEventListener('pointerdown', function(e) {
      pressTimer = setTimeout(() => {
        openCard(this.dataset.char, this.dataset.phonetic, this.dataset.hint, this.dataset.hira);
        pressTimer = null;
      }, 500);
    });
    el.addEventListener('pointerup', function() {
      if (pressTimer) {
        clearTimeout(pressTimer);
        pressTimer = null;
        // 短按 → 播放
        browsePlay(this, this.dataset.char);
      }
    });
    el.addEventListener('pointerleave', function() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });
    el.addEventListener('contextmenu', e => e.preventDefault());
  });
}

function browsePlay(el, char) {
  document.querySelectorAll('.kana-card.playing').forEach(c => c.classList.remove('playing'));
  el.classList.add('playing');
  speak(char);
  setTimeout(() => el.classList.remove('playing'), 600);
}

// ===== CARD MODAL =====
function openCard(char, phonetic, hint, hira) {
  speak(char);
  document.getElementById('card-modal-char').textContent = char;
  document.getElementById('card-modal-phonetic').textContent = phonetic;
  document.getElementById('card-modal-hint').textContent = hint;
  document.getElementById('card-modal').classList.add('show');
}
document.addEventListener('click', e => {
  const modal = document.getElementById('card-modal');
  if (modal.classList.contains('show') && !document.getElementById('card-modal-inner').contains(e.target)) {
    modal.classList.remove('show');
  }
});

// ===== ROW SELECTORS =====
function renderRowSelectors() {
  const key = currentKana === 'hira' ? 'hira' : 'kata';
  const container = document.getElementById('quiz-row-btns');
  container.innerHTML = `
    <button class="row-sel-all-btn" onclick="startSession('quiz', -1)">
      <span class="row-sel-all-icon">📝</span>
      <div class="row-sel-all-text">
        <span class="row-sel-all-title">全部一起測驗</span>
        <span class="row-sel-all-sub">共 ${ALL.length} 個字，全部混在一起</span>
      </div>
    </button>
    <div class="row-sel-grid">
      ${ROWS.map((row, ri) => {
        const kanas = row.items.map(i => i[key]).join(' ');
        return `
        <button class="row-sel-card" onclick="startSession('quiz', ${ri})">
          <span class="row-sel-card-kanas">${kanas}</span>
          <div class="row-sel-card-bottom">
            ${row.rowPhonetic ? `<span class="row-sel-card-phonetic">${row.rowPhonetic}</span>` : ''}
          </div>
        </button>`;
      }).join('')}
    </div>
  `;
}

function showRowSelector(mode) {
  document.getElementById('quiz-row-selector').style.display = '';
  document.getElementById('quiz-main-wrap').style.display = 'none';
}

function startSession(mode, rowIdx) {
  const items = rowIdx === -1 ? ALL : ROWS[rowIdx].items;
  quizItems = items;
  completedOnce = false;
  document.getElementById('quiz-row-selector').style.display = 'none';
  document.getElementById('quiz-main-wrap').style.display = '';
  resetQuiz();
}

// ===== PRACTICE =====
function renderDots() {
  document.getElementById('prac-dots').innerHTML = pracItems.map((_, i) => `
    <div class="prac-dot ${i < pracIdx ? 'done' : i === pracIdx ? 'current' : ''}"></div>
  `).join('');
}

function updatePractice() {
  if (!pracItems.length) return;
  const item = pracItems[pracIdx];
  const key = currentKana === 'hira' ? 'hira' : 'kata';
  const card = document.getElementById('prac-card');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');

  document.getElementById('prac-kana').textContent = item[key];
  document.getElementById('prac-progress').textContent =
    `第 ${pracIdx + 1} 個 / 共 ${pracItems.length} 個`;

  const showPhonetic = document.getElementById('phonetic-check').checked;
  const ph = document.getElementById('prac-phonetic');
  ph.textContent = item.phonetic;
  ph.classList.toggle('hidden', !showPhonetic);

  document.getElementById('prac-hint').innerHTML =
    `<span class="prac-hint-emoji">💡</span>${item.hint}`;
  renderDots();
}

function playPractice() {
  if (!pracItems.length) return;
  const item = pracItems[pracIdx];
  speak(currentKana === 'hira' ? item.hira : item.kata);
  const btn = document.querySelector('.play-big-btn');
  btn.classList.add('bounce');
  setTimeout(() => btn.classList.remove('bounce'), 600);
}

function pracNav(dir) {
  pracIdx = Math.max(0, Math.min(pracItems.length - 1, pracIdx + dir));
  updatePractice();
}

// ===== QUIZ =====
function resetQuiz() {
  quizIdx = 0; quizCorrect = 0; quizWrong = 0; quizAnswered = false;
  wrongItems = [];
  quizOrder = quizItems.map((_, i) => i);
  document.getElementById('q-correct').textContent = 0;
  document.getElementById('q-wrong').textContent = 0;
  document.getElementById('quiz-finish').classList.remove('show');
  document.getElementById('quiz-main-area').style.display = '';
  renderQuiz();
}

function renderQuiz() {
  if (quizIdx >= quizOrder.length) { showFinish(); return; }
  quizAnswered = false;
  const item = quizItems[quizOrder[quizIdx]];
  const key = currentKana === 'hira' ? 'hira' : 'kata';

  document.getElementById('q-prog').textContent = `${quizIdx + 1}/${quizOrder.length}`;
  document.getElementById('q-feedback').className = 'quiz-feedback';
  document.getElementById('q-next-btn').classList.remove('show');

  const wrongPool = ALL.filter(a => a[key] !== item[key]);
  const options = shuffle([item, ...shuffle(wrongPool).slice(0, 3)]);

  document.getElementById('q-options').innerHTML = options.map(opt => `
    <button class="quiz-opt" onclick="answerQuiz(this, '${opt[key]}', '${item[key]}')">
      ${opt[key]}
    </button>
  `).join('');

  setTimeout(() => speak(item[key]), 500);
}

function playQuiz() {
  const item = quizItems[quizOrder[quizIdx]];
  speak(currentKana === 'hira' ? item.hira : item.kata);
}

function answerQuiz(el, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-opt').forEach(o => o.classList.add('disabled'));

  const fb = document.getElementById('q-feedback');
  const item = quizItems[quizOrder[quizIdx]];
  if (chosen === correct) {
    el.classList.add('correct');
    quizCorrect++;
    document.getElementById('q-correct').textContent = quizCorrect;
    fb.textContent = pick(CORRECT_MSGS);
    fb.className = 'quiz-feedback show-correct';
    earnCoin();
  } else {
    el.classList.add('wrong');
    quizWrong++;
    document.getElementById('q-wrong').textContent = quizWrong;
    fb.textContent = pick(WRONG_MSGS);
    fb.className = 'quiz-feedback show-wrong';
    document.querySelectorAll('.quiz-opt').forEach(o => {
      if (o.textContent.trim() === correct) o.classList.add('reveal');
    });
    markWrong(item.hira);
    if (!wrongItems.find(i => i.hira === item.hira)) wrongItems.push(item);
  }
  document.getElementById('q-next-btn').textContent =
    (quizIdx + 1 >= quizOrder.length) ? '看結果 🎉' : '下一題 ▶';
  document.getElementById('q-next-btn').classList.add('show');
}

function nextQuiz() { quizIdx++; renderQuiz(); }

function showFinish() {
  document.getElementById('quiz-main-area').style.display = 'none';
  document.getElementById('quiz-finish').classList.add('show');
  const total = quizOrder.length;
  const pct = Math.round(quizCorrect / total * 100);
  const fd = getFinishData(pct);
  document.getElementById('finish-emoji').textContent = fd.emoji;
  document.getElementById('finish-title').textContent = fd.title;
  document.getElementById('finish-correct-score').textContent = `✅ 答對 ${quizCorrect} 題`;
  document.getElementById('finish-wrong-score').textContent = `❌ 答錯 ${quizWrong} 題`;
  document.getElementById('finish-encourage').textContent = fd.sub;

  const key = currentKana === 'hira' ? 'hira' : 'kata';
  const wrongList = document.getElementById('finish-wrong-list');
  const retryBtn = document.getElementById('retry-btn');
  if (wrongItems.length > 0) {
    wrongList.innerHTML = wrongItems.map(i =>
      `<span class="finish-wrong-char">${i[key]}</span>`
    ).join('');
    retryBtn.style.display = 'block';
  } else {
    wrongList.innerHTML = '';
    retryBtn.style.display = 'none';
  }
  completedOnce = true;
}

function retryWrong() {
  quizItems = [...wrongItems];
  wrongItems = [];
  quizIdx = 0; quizCorrect = 0; quizWrong = 0; quizAnswered = false;
  quizOrder = quizItems.map((_, i) => i);
  document.getElementById('q-correct').textContent = 0;
  document.getElementById('q-wrong').textContent = 0;
  document.getElementById('quiz-finish').classList.remove('show');
  document.getElementById('quiz-main-area').style.display = '';
  completedOnce = false;
  renderQuiz();
}

function restartQuiz() {
  quizOrder = completedOnce ? shuffle(quizItems.map((_, i) => i)) : quizItems.map((_, i) => i);
  quizIdx = 0; quizCorrect = 0; quizWrong = 0; quizAnswered = false;
  wrongItems = [];
  document.getElementById('q-correct').textContent = 0;
  document.getElementById('q-wrong').textContent = 0;
  document.getElementById('quiz-finish').classList.remove('show');
  document.getElementById('quiz-main-area').style.display = '';
  renderQuiz();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
